# QLoRA Fine-tuning Configuration for Gemma 2 2B on Medical QA
# Fine-tuning via standard PEFT + BitsAndBytes

model:
  name: "google/gemma-2-2b"              # Gemma 2 base (NOT instruction-tuned)
  dtype: "float16"                        # fp16 for T4 compatibility
  max_seq_length: 512                     # Training sequence length
  load_in_4bit: true                      # QLoRA: 4-bit base quantization

qlora:
  r: 16                    # LoRA rank
  lora_alpha: 32           # Scaling factor (typically 2x rank)
  lora_dropout: 0.05
  target_modules:          # Attention + FFN layers
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"
  use_gradient_checkpointing: true        # Standard gradient checkpointing

training:
  num_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8   # Effective batch size = 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  optim: "adamw_8bit"              # 8-bit Adam for memory efficiency
  fp16: true                       # fp16 for T4 compatibility

data:
  train_dataset: "pubmedqa+medqa"  # Combined training data
  eval_datasets:
    - "pubmedqa"
    - "medqa"
  train_split: "train"
  eval_split: "validation"
  max_train_samples: null          # null = use all
  max_eval_samples: 500

prompt_format:
  # Gemma 2 turn tokens
  turn_start: "<start_of_turn>"
  turn_end: "<end_of_turn>"
  roles:
    - "user"
    - "model"
    - "system"
